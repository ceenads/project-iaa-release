    function clampNumber(value, min, max) {
        return Math.min(Math.max(value, min), Math.max(min, max));
    }

    function ensureConnectionTestWindowInViewport() {
        const panel = document.getElementById('connectionTestPanel');
        if (!panel || panel.style.display === 'none') {
            return;
        }

        const rect = panel.getBoundingClientRect();
        const margin = 8;
        const maxLeft = window.innerWidth - rect.width - margin;
        const maxTop = window.innerHeight - rect.height - margin;
        let nextLeft = rect.left;
        let nextTop = rect.top;

        if (rect.left < margin || rect.right > window.innerWidth - margin) {
            nextLeft = clampNumber(rect.left, margin, maxLeft);
        }
        if (rect.top < margin || rect.bottom > window.innerHeight - margin) {
            nextTop = clampNumber(rect.top, margin, maxTop);
        }

        if (nextLeft !== rect.left || nextTop !== rect.top) {
            panel.style.left = `${nextLeft}px`;
            panel.style.top = `${nextTop}px`;
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
        }
    }

    function setupConnectionTestWindowDrag() {
        if (connectionTestDragReady) {
            return;
        }

        const panel = document.getElementById('connectionTestPanel');
        const handle = document.getElementById('connectionTestDragHandle');
        if (!panel || !handle) {
            return;
        }

        connectionTestDragReady = true;
        let dragging = null;

        const moveWindow = (event) => {
            if (!dragging || dragging.pointerId !== event.pointerId) {
                return;
            }

            const margin = 8;
            const maxLeft = window.innerWidth - panel.offsetWidth - margin;
            const maxTop = window.innerHeight - panel.offsetHeight - margin;
            panel.style.left = `${clampNumber(event.clientX - dragging.offsetX, margin, maxLeft)}px`;
            panel.style.top = `${clampNumber(event.clientY - dragging.offsetY, margin, maxTop)}px`;
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
        };

        const stopDragging = (event) => {
            if (!dragging || dragging.pointerId !== event.pointerId) {
                return;
            }
            try {
                handle.releasePointerCapture(event.pointerId);
            } catch (_) {
                // Pointer capture may already be released by the browser.
            }
            dragging = null;
        };

        handle.addEventListener('pointerdown', (event) => {
            if (event.button !== 0 || event.target.closest('a, button')) {
                return;
            }

            const rect = panel.getBoundingClientRect();
            dragging = {
                pointerId: event.pointerId,
                offsetX: event.clientX - rect.left,
                offsetY: event.clientY - rect.top
            };
            panel.style.left = `${rect.left}px`;
            panel.style.top = `${rect.top}px`;
            panel.style.right = 'auto';
            panel.style.bottom = 'auto';
            handle.setPointerCapture(event.pointerId);
            event.preventDefault();
        });
        handle.addEventListener('pointermove', moveWindow);
        handle.addEventListener('pointerup', stopDragging);
        handle.addEventListener('pointercancel', stopDragging);
        window.addEventListener('resize', ensureConnectionTestWindowInViewport);
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function githubHeaders(token, extraHeaders = {}) {
        return {
            'Accept': 'application/vnd.github+json',
            'Authorization': 'Bearer ' + token,
            'X-GitHub-Api-Version': '2022-11-28',
            ...extraHeaders
        };
    }

    async function githubJson(url, token, options = {}) {
        const response = await fetch(url, {
            ...options,
            headers: githubHeaders(token, options.headers || {})
        });
        if (!response.ok) {
            const text = await response.text();
            throw new Error(`GitHub API 返回 ${response.status}: ${text}`);
        }
        return response.json();
    }

    function workflowRunsUrl({ owner, name }, workflowFile, ref) {
        const workflow = encodeURIComponent(workflowFile);
        const params = new URLSearchParams({
            branch: ref || 'master',
            event: 'workflow_dispatch',
            per_page: '20'
        });
        return `https://api.github.com/repos/${owner}/${name}/actions/workflows/${workflow}/runs?${params.toString()}`;
    }

    function workflowRunUrl({ owner, name }, runId) {
        return `https://api.github.com/repos/${owner}/${name}/actions/runs/${runId}`;
    }

    function workflowJobsUrl({ owner, name }, runId) {
        return `https://api.github.com/repos/${owner}/${name}/actions/runs/${runId}/jobs?per_page=100`;
    }

    function workflowJobLogsUrl({ owner, name }, jobId) {
        return `https://api.github.com/repos/${owner}/${name}/actions/jobs/${jobId}/logs`;
    }

    function statusLabel(status, conclusion) {
        if (status === 'completed') {
            const conclusions = {
                success: '成功',
                failure: '失败',
                cancelled: '已取消',
                skipped: '已跳过',
                timed_out: '超时',
                action_required: '需要处理',
                neutral: '无结果'
            };
            return conclusions[conclusion] || conclusion || '已完成';
        }
        const statuses = {
            queued: '排队中',
            requested: '已请求',
            waiting: '等待中',
            pending: '准备中',
            in_progress: '执行中'
        };
        return statuses[status] || status || '未知';
    }

    function changedDeployState(state, key, value) {
        if (state[key] === value) {
            return false;
        }
        state[key] = value;
        return true;
    }

    async function findWorkflowRun(repoInfo, workflowFile, ref, token, startedAt, log = deployLog, label = 'workflow run') {
        const deadline = Date.now() + DEPLOY_RUN_FIND_TIMEOUT_MS;
        const earliest = new Date(startedAt.getTime() - 15000);
        let waitingLoggedAt = 0;

        while (Date.now() < deadline) {
            const data = await githubJson(workflowRunsUrl(repoInfo, workflowFile, ref), token);
            const runs = (data.workflow_runs || [])
                .filter(run => new Date(run.created_at) >= earliest)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (runs.length > 0) {
                return runs[0];
            }

            if (Date.now() - waitingLoggedAt > 12000) {
                log(`${repoInfo.repo} 等待 GitHub 创建 ${label}...`);
                waitingLoggedAt = Date.now();
            }
            await sleep(DEPLOY_RUN_FIND_INTERVAL_MS);
        }

        throw new Error(`${repoInfo.repo} 未找到刚触发的 ${label}，请点击 Run 或打开 Actions 确认是否已启动`);
    }

    function normalizeJobLog(text) {
        if (!text || text.charCodeAt(0) === 0x50 && text.charCodeAt(1) === 0x4b) {
            return [];
        }
        return text
            .replace(/\x1b\[[0-9;]*m/g, '')
            .split(/\r?\n/)
            .map(line => line.trimEnd())
            .filter(Boolean);
    }

    async function appendJobLogTail(repoInfo, job, token, state, log = deployLog, options = {}) {
        if (!['in_progress', 'completed'].includes(job.status)) {
            return;
        }

        const key = String(job.id);
        if (state.finishedLogs[key] && job.status === 'completed') {
            return;
        }

        try {
            const response = await fetch(workflowJobLogsUrl(repoInfo, job.id), {
                headers: githubHeaders(token)
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const lines = normalizeJobLog(await response.text());
            if (lines.length === 0) {
                return;
            }

            const previousCount = state.logLineCounts[key] || 0;
            const nextLines = lines.slice(previousCount);
            state.logLineCounts[key] = lines.length;
            if (job.status === 'completed') {
                state.finishedLogs[key] = true;
            }

            const lineLimit = options.logTailLines || 12;
            const linesToLog = lineLimit > 0 ? nextLines.slice(-lineLimit) : nextLines;
            linesToLog.forEach(line => {
                log(`${repoInfo.repo} / ${job.name} | ${line.slice(0, 260)}`);
            });
        } catch (error) {
            if (!state.logReadErrors[key]) {
                state.logReadErrors[key] = true;
                log(`${repoInfo.repo} / ${job.name} 原始日志无法直接读取：${error.message}，可点击 Run 链接查看完整日志。`);
            }
        }
    }

    async function monitorWorkflowRun(repoInfo, run, token, options = {}) {
        const log = options.log || deployLog;
        const completeLabel = options.completeLabel || '部署结束';
        const failureMessage = options.failureMessage || '部署未成功';
        const pollIntervalMs = options.pollIntervalMs || DEPLOY_RUN_POLL_INTERVAL_MS;
        const logTailLines = options.logTailLines || 12;
        const stateKey = `${repoInfo.repo}:${run.id}`;
        const state = deployMonitorState[stateKey] || {
            jobs: {},
            steps: {},
            logLineCounts: {},
            logReadErrors: {},
            finishedLogs: {}
        };
        deployMonitorState[stateKey] = state;

        log(`${repoInfo.repo} Run #${run.run_number}: ${run.html_url}`);

        while (true) {
            const latestRun = await githubJson(workflowRunUrl(repoInfo, run.id), token);
            const runStatus = `${latestRun.status}:${latestRun.conclusion || ''}`;
            if (changedDeployState(state, 'runStatus', runStatus)) {
                log(`${repoInfo.repo} Run 状态：${statusLabel(latestRun.status, latestRun.conclusion)}`);
            }

            const jobsPayload = await githubJson(workflowJobsUrl(repoInfo, run.id), token);
            const jobs = jobsPayload.jobs || [];

            for (const job of jobs) {
                const jobStatus = `${job.status}:${job.conclusion || ''}`;
                if (state.jobs[job.id] !== jobStatus) {
                    state.jobs[job.id] = jobStatus;
                    log(`${repoInfo.repo} Job ${job.name}：${statusLabel(job.status, job.conclusion)}`);
                }

                for (const step of job.steps || []) {
                    const stepKey = `${job.id}:${step.number}:${step.name}`;
                    const stepStatus = `${step.status}:${step.conclusion || ''}`;
                    if (state.steps[stepKey] !== stepStatus) {
                        state.steps[stepKey] = stepStatus;
                        log(`${repoInfo.repo} Step ${job.name} / ${step.name}：${statusLabel(step.status, step.conclusion)}`);
                    }
                }

                await appendJobLogTail(repoInfo, job, token, state, log, { logTailLines });
            }

            if (latestRun.status === 'completed') {
                const finalStatus = statusLabel(latestRun.status, latestRun.conclusion);
                log(`${repoInfo.repo} ${completeLabel}：${finalStatus}`);
                if (latestRun.conclusion !== 'success') {
                    throw new Error(`${repoInfo.repo} ${failureMessage}：${finalStatus}`);
                }
                return latestRun;
            }

            await sleep(pollIntervalMs);
        }
    }

    function deploySetup() {
        currentConfig.setup = currentConfig.setup || {};
        currentConfig.setup.deploy = currentConfig.setup.deploy || {};
        return currentConfig.setup.deploy;
    }

    function parseRepo(repo, label) {
        const value = repo.trim();
        const parts = value.split('/');
        if (parts.length !== 2 || !parts[0] || !parts[1]) {
            throw new Error(`${label} 仓库格式必须是 owner/repo`);
        }
        return { repo: value, owner: parts[0], name: parts[1] };
    }

    function hasDeployValue(value) {
        return value !== undefined && value !== null && String(value).trim() !== '';
    }

    function deployServerList(servers) {
        return Array.isArray(servers) ? servers : [];
    }

    function validateDeployPort(value, label, errors) {
        if (hasDeployValue(value) && !validatePort(value)) {
            errors.push(`${label} 端口无效：${value}`);
        }
    }

    function validateDeployServerList(servers, label, errors) {
        const list = deployServerList(servers);
        if (list.length === 0) {
            errors.push(`${label} 未配置服务器`);
            return;
        }

        list.forEach((server, index) => {
            const name = `${label} 第 ${index + 1} 台`;
            if (!hasDeployValue(server?.host)) {
                errors.push(`${name} 缺少公网地址`);
            }
            validateDeployPort(server?.port, `${name} SSH`, errors);
            const hasPassword = hasDeployValue(server?.pass);
            const hasPrivateKey = hasDeployValue(server?.private_key);
            if (!hasPassword && !hasPrivateKey) {
                errors.push(`${name} 缺少 SSH 密码或 SSH 私钥`);
            } else if (hasPassword && hasPrivateKey) {
                errors.push(`${name} SSH 密码和私钥只能选择一种`);
            }
        });
    }

    function validateDeployEnv(env, requiredKeys, label, errors) {
        requiredKeys.forEach(key => {
            if (!hasDeployValue(env?.[key])) {
                errors.push(`${label} 缺少 ${key}`);
            }
        });
    }

    function selectedDeployDomains(config, targetDomain) {
        const domains = Array.isArray(config?.web) ? config.web : [];
        if (targetDomain === 'all') {
            return domains;
        }
        return domains.filter(domain => domain.domain === targetDomain);
    }

    function validateDeployConfig(targetDomain, components) {
        const errors = [];
        const selected = new Set(components);
        const wants = name => selected.has(name);
        const domains = selectedDeployDomains(currentConfig, targetDomain);

        if (domains.length === 0) {
            errors.push(targetDomain === 'all' ? '配置里没有可部署域名' : `未找到部署域名：${targetDomain}`);
        }

        domains.forEach(domain => {
            const label = domain.domain || '未命名域名';
            const system = domain.system || {};
            const service = system.service || {};

            if (!hasDeployValue(domain.domain)) {
                errors.push('域名配置缺少 domain');
            }

            if (wants('redis')) {
                const redis = service.redis || {};
                const redisEnv = redis.environment || {};
                validateDeployServerList(redis.servers, `${label} / Redis`, errors);
                validateDeployPort(redisEnv.PORT ?? domain.environment?.REDIS_PORT, `${label} / Redis`, errors);
                if (hasDeployValue(domain.environment?.REDIS_RANK) && !validateRedisRank(domain.environment.REDIS_RANK)) {
                    errors.push(`${label} / Redis 库序无效：${domain.environment.REDIS_RANK}`);
                }
            }

            if (wants('nginx') || wants('bus-web') || wants('risk-web')) {
                validateDeployServerList(service.nginx?.servers, `${label} / Nginx 网关`, errors);
            }

            if (wants('bus-web')) {
                validateDeployPort(system.bus?.web?.nginx?.listen_port, `${label} / 业务前端`, errors);
            }

            if (wants('risk-web')) {
                validateDeployPort(system.risk?.web?.nginx?.listen_port, `${label} / 风控前端`, errors);
            }

            if (wants('bus-java')) {
                const java = system.bus?.java || {};
                validateDeployServerList(java.servers, `${label} / 业务后端`, errors);
                validateDeployEnv(java.environment, ['DB_HOST', 'DB_PORT', 'DB_USER', 'ADMIN_USER'], `${label} / 业务后端`, errors);
                validateDeployPort(java.environment?.DB_PORT, `${label} / 业务后端数据库`, errors);
            }

            if (wants('risk-java')) {
                const java = system.risk?.java || {};
                validateDeployServerList(java.servers, `${label} / 风控后端`, errors);
                validateDeployEnv(java.environment, ['DB_HOST', 'DB_PORT', 'DB_USER', 'ADMIN_USER'], `${label} / 风控后端`, errors);
                validateDeployPort(java.environment?.DB_PORT, `${label} / 风控后端数据库`, errors);
            }

            if (wants('producer')) {
                const producer = service.producer || {};
                validateDeployServerList(producer.servers, `${label} / Producer`, errors);
                validateDeployEnv(
                    producer.environment,
                    ['DB_BUS_HOST', 'DB_BUS_PORT', 'DB_BUS_USER', 'DB_RISK_HOST', 'DB_RISK_PORT', 'DB_RISK_USER', 'GATEWAY_PRIVATE_ADDRESS'],
                    `${label} / Producer`,
                    errors
                );
                validateDeployPort(producer.environment?.DB_BUS_PORT, `${label} / Producer 业务数据库`, errors);
                validateDeployPort(producer.environment?.DB_RISK_PORT, `${label} / Producer 风控数据库`, errors);
            }
        });

        if (errors.length > 0) {
            alert('❌ 部署配置不完整：\n\n' + errors.slice(0, 12).join('\n') + (errors.length > 12 ? `\n... 还有 ${errors.length - 12} 项` : ''));
            return false;
        }

        return true;
    }

    function checkedDeployComponents() {
        return Array.from(document.querySelectorAll('.deploy-component:checked')).map(input => input.value);
    }

    function setCheckedDeployComponents(values) {
        const selected = new Set(values || []);
        document.querySelectorAll('.deploy-component').forEach(input => {
            input.checked = selected.size === 0 ? input.defaultChecked : selected.has(input.value);
        });
    }

    function serviceComponentImageVersion(setup, name, fallback) {
        return setup.service_components?.[name]?.image_version || setup[`${name}_version`] || fallback;
    }

    function deployRedisVersion() {
        return document.getElementById('deployRedisVersion').value.trim() || '7.2-alpine';
    }

    function deployNginxVersion() {
        return document.getElementById('deployNginxVersion').value.trim() || '1.27.3';
    }

    function saveDeploySetup() {
        if (!currentConfig) return;
        const setup = deploySetup();
        setup.repositories = {
            platform: {
                repo: deployPlatformRepositoryValue(),
                ref: document.getElementById('deployPlatformWorkflowRef').value.trim() || 'master',
                release_tag: deployPlatformReleaseTagValue()
            },
            service: {
                repo: deployServiceRepositoryValue(),
                ref: document.getElementById('deployServiceWorkflowRef').value.trim() || 'master',
                release_tag: deployServiceReleaseTagValue()
            }
        };
        setup.target_domain = document.getElementById('deployTargetDomain').value || 'all';
        setup.components = checkedDeployComponents();
        setup.service_components = {
            redis: {
                image_version: deployRedisVersion()
            },
            nginx: {
                image_version: deployNginxVersion()
            }
        };
        delete setup.redis_version;
        delete setup.nginx_version;
        setup.token = document.getElementById('deployGithubToken').value.trim();
        updateEditorConfig();
    }

    function applyDeploySetup() {
        const setup = currentConfig?.setup?.deploy || {};
        const repositories = setup.repositories || {};
        const platform = repositories.platform || {};
        const service = repositories.service || {};
        document.getElementById('deployPlatformRepository').value = normalizeRepositoryValue(platform.repo || document.getElementById('deployPlatformRepository').value, 'ceenads/project-iaa-platform');
        document.getElementById('deployPlatformWorkflowRef').value = platform.ref || document.getElementById('deployPlatformWorkflowRef').value || 'master';
        document.getElementById('deployPlatformReleaseTag').value = normalizeReleaseTagValue(platform.release_tag || document.getElementById('deployPlatformReleaseTag').value);
        document.getElementById('deployServiceRepository').value = normalizeRepositoryValue(service.repo || document.getElementById('deployServiceRepository').value, 'ceenads/project-iaa-service');
        document.getElementById('deployServiceWorkflowRef').value = service.ref || document.getElementById('deployServiceWorkflowRef').value || 'master';
        document.getElementById('deployServiceReleaseTag').value = normalizeReleaseTagValue(service.release_tag || document.getElementById('deployServiceReleaseTag').value);
        document.getElementById('deployRedisVersion').value = serviceComponentImageVersion(setup, 'redis', document.getElementById('deployRedisVersion').value || '7.2-alpine');
        document.getElementById('deployNginxVersion').value = serviceComponentImageVersion(setup, 'nginx', document.getElementById('deployNginxVersion').value || '1.27.3');
        document.getElementById('deployGithubToken').value = setup.token || '';
        setCheckedDeployComponents(setup.components);
        refreshDeployDomainOptions();
        if (setup.target_domain) {
            const select = document.getElementById('deployTargetDomain');
            if (Array.from(select.options).some(option => option.value === setup.target_domain)) {
                select.value = setup.target_domain;
            }
        }
    }

    function cleanIaaConfigForDispatch() {
        const clone = JSON.parse(JSON.stringify(currentConfig || {}));
        if (clone.setup?.deploy?.token) {
            delete clone.setup.deploy.token;
        }
        return clone;
    }

    function componentString(values) {
        return values.length === 0 ? '' : values.join(',');
    }

    function refreshDeployDomainOptions() {
        const select = document.getElementById('deployTargetDomain');
        if (!select || !previewEditor) return;
        const previous = select.value || selectedDomain || currentConfig?.setup?.deploy?.target_domain || 'all';
        const config = previewEditor.get();
        const domains = (config.web || []).map(item => item.domain).filter(Boolean);
        select.innerHTML = '<option value="all">全部域名</option>';
        domains.forEach(domain => {
            const option = document.createElement('option');
            option.value = domain;
            option.textContent = domain;
            select.appendChild(option);
        });
        if (domains.includes(previous) || previous === 'all') {
            select.value = previous;
        } else if (selectedDomain && domains.includes(selectedDomain)) {
            select.value = selectedDomain;
        }
    }

    function openDeployActionsForRepository(inputId, label) {
        try {
            const fallback = label === 'Platform' ? 'ceenads/project-iaa-platform' : 'ceenads/project-iaa-service';
            const repository = parseRepo(normalizeRepositoryValue(document.getElementById(inputId).value, fallback), label);
            window.open(`https://github.com/${repository.repo}/actions/workflows/deploy.yml`, '_blank');
        } catch (error) {
            alert(error.message);
        }
    }

    function openPlatformDeployActions() {
        openDeployActionsForRepository('deployPlatformRepository', 'Platform');
    }

    function openProducerDeployActions() {
        openDeployActionsForRepository('deployServiceRepository', 'Service');
    }

    async function dispatchDeploy({ repo, owner, name }, ref, token, deployConfig) {
        const repoInfo = { repo, owner, name };
        const startedAt = new Date();
        deployLog(`触发部署：${repo} / ${deployConfig.release_tag} / ${deployConfig.components}`);
        const response = await fetch(`https://api.github.com/repos/${owner}/${name}/actions/workflows/deploy.yml/dispatches`, {
            method: 'POST',
            headers: githubHeaders(token, {
                'Content-Type': 'application/json'
            }),
            body: JSON.stringify({
                ref: ref || 'master',
                inputs: {
                    deploy_config: JSON.stringify(deployConfig)
                }
            })
        });

        if (response.status !== 204) {
            const text = await response.text();
            throw new Error(`${repo} GitHub API 返回 ${response.status}: ${text}`);
        }
        deployLog(`${repo} 部署 workflow 已触发。`);
        const run = await findWorkflowRun(repoInfo, DEPLOY_WORKFLOW_FILE, ref || 'master', token, startedAt, deployLog, 'deploy workflow run');
        return monitorWorkflowRun(repoInfo, run, token);
    }

    async function triggerDeployFromPreview() {
        try {
            if (activeMainTab === 'config' && !saveCurrentDomainDraft(false)) {
                showMainTab('config');
                return;
            }
            if (!syncEditorConfig()) {
                return;
            }
            saveDeploySetup();
            generatePreview();
            resetDeployLog();
            deployLog('开始部署...');

            const token = document.getElementById('deployGithubToken').value.trim();
            if (!token) {
                throw new Error('请输入 GitHub Token');
            }

            const selected = checkedDeployComponents();
            if (selected.length === 0) {
                throw new Error('请至少选择一个部署组件');
            }

            const targetDomain = document.getElementById('deployTargetDomain').value || 'all';
            if (!validateDeployConfig(targetDomain, selected)) {
                return;
            }

            const platformComponents = selected.filter(component => ['redis', 'nginx', 'bus-java', 'risk-java', 'bus-web', 'risk-web'].includes(component));
            const producerComponents = selected.filter(component => component === 'producer');
            const iaaConfig = cleanIaaConfigForDispatch();
            const serviceComponentVersions = {
                redis: {
                    image_version: deployRedisVersion()
                },
                nginx: {
                    image_version: deployNginxVersion()
                }
            };
            const baseConfig = {
                target_domain: targetDomain,
                service_components: serviceComponentVersions,
                iaa_config: iaaConfig
            };

            const dispatches = [];
            if (platformComponents.length > 0) {
                dispatches.push(dispatchDeploy(
                    parseRepo(deployPlatformRepositoryValue(), 'Platform'),
                    document.getElementById('deployPlatformWorkflowRef').value.trim() || 'master',
                    token,
                    {
                        ...baseConfig,
                        release_tag: deployPlatformReleaseTagValue(),
                        components: componentString(platformComponents)
                    }
                ));
            }
            if (producerComponents.length > 0) {
                dispatches.push(dispatchDeploy(
                    parseRepo(deployServiceRepositoryValue(), 'Service'),
                    document.getElementById('deployServiceWorkflowRef').value.trim() || 'master',
                    token,
                    {
                        ...baseConfig,
                        release_tag: deployServiceReleaseTagValue(),
                        components: componentString(producerComponents)
                    }
                ));
            }

            await Promise.all(dispatches);
            deployLog('部署执行已完成。');
        } catch (error) {
            deployLog('失败：' + error.message);
            alert(error.message);
        }
    }

    // 页面加载时初始化
    window.onload = function() {
        // 初始化 JSON 编辑器
        const container = document.getElementById('jsoneditor');
        const options = {
            mode: 'code',
            modes: ['tree', 'code', 'text'],
            mainMenuBar: false,  // 隐藏顶部工具栏
            navigationBar: false,  // 隐藏导航栏
            statusBar: false,  // 隐藏状态栏
            onError: function (err) {
                alert('JSON 错误：' + err.toString());
            }
        };
        editor = new JSONEditor(container, options);

        // 设置默认配置
        const defaultConfig = {
            "web": []
        };
        editor.set(defaultConfig);

        // 初始化预览编辑器（只读模式）
        const previewContainer = document.getElementById('previewEditor');
        const previewOptions = {
            mode: 'code',
            modes: ['code', 'tree'],
            mainMenuBar: false,  // 隐藏顶部工具栏
            navigationBar: false,  // 隐藏导航栏
            statusBar: false,  // 隐藏状态栏
            onEditable: function () {
                return false;  // 设置为只读
            },
            onError: function (err) {
                alert('JSON 错误：' + err.toString());
            }
        };
        previewEditor = new JSONEditor(previewContainer, previewOptions);

        syncEditorConfig();
        populateDomainList();
        showMainTab('load');

        const query = new URLSearchParams(window.location.search);
        const repoFromTemplate = '__REPOSITORY__';
        const tagFromTemplate = '__RELEASE_TAG__';
        const repo = query.get('repo') || (repoFromTemplate === '__REPOSITORY__' ? 'ceenads/project-iaa-platform' : repoFromTemplate);
        const tag = query.get('tag') || (tagFromTemplate === '__RELEASE_TAG__' ? 'latest' : tagFromTemplate);
        document.getElementById('deployPlatformRepository').value = repo;
        document.getElementById('deployPlatformReleaseTag').value = tag;
        document.getElementById('deployServiceRepository').value = query.get('service_repo') || 'ceenads/project-iaa-service';
        document.getElementById('deployServiceReleaseTag').value = query.get('service_tag') || 'latest';
        applyDeploySetup();
    };
</script>
