<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAA 配置与部署向导</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .container {
            max-width: 1400px;
        }
        .wizard-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        /* 选项卡样式 */
        .wizard-tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 3px solid #dee2e6;
        }
        .wizard-tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
            border-right: 1px solid #dee2e6;
        }
        .wizard-tab:last-child {
            border-right: none;
        }
        .wizard-tab .step-number {
            display: inline-block;
            width: 40px;
            height: 40px;
            line-height: 40px;
            border-radius: 50%;
            background: #6c757d;
            color: white;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .wizard-tab .step-title {
            display: block;
            font-weight: 600;
            color: #6c757d;
        }
        .wizard-tab.active {
            background: white;
            border-bottom: 3px solid #667eea;
            margin-bottom: -3px;
        }
        .wizard-tab.active .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .wizard-tab.active .step-title {
            color: #667eea;
        }
        .wizard-tab.completed .step-number {
            background: #28a745;
        }
        .wizard-tab.completed .step-number::after {
            content: '✓';
        }

        /* 内容区域 */
        .wizard-content {
            padding: 30px;
            min-height: 400px;
        }
        .step-pane {
            display: none;
        }
        .step-pane.active {
            display: block;
        }

        /* 域名列表 */
        .domain-list {
            max-height: 400px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .domain-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }
        .domain-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .domain-item.selected {
            background: #d4edda;
            border-left-color: #28a745;
        }
        .domain-item .domain-name {
            font-weight: 600;
            color: #495057;
            font-size: 16px;
        }
        .domain-item .btn-delete-domain {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .domain-item .btn-delete-domain:hover {
            background: #c82333;
        }

        /* 服务器行 */
        .server-row {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            position: relative;
        }
        .artifact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 12px;
            align-items: stretch;
        }
        .artifact-option {
            background: #fff;
            border: 1px solid #dee2e6;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            min-height: 86px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }
        .service-component-option {
            background: #fff;
            border: 1px solid #dee2e6;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 12px;
            min-height: 86px;
            display: grid;
            grid-template-columns: minmax(110px, 1fr) minmax(150px, 170px);
            gap: 12px;
            align-items: end;
        }
        .service-component-check {
            display: flex;
            align-items: center;
            min-height: 38px;
            font-weight: 600;
        }
        .service-component-version label {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .service-component-version {
            min-width: 150px;
        }
        .service-component-version .form-control {
            min-height: 38px;
        }
        .deploy-repo-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }
        .deploy-repo-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            padding: 12px;
        }
        .deploy-repo-title {
            font-weight: 700;
            color: #495057;
            margin-bottom: 10px;
        }
        .deploy-repo-main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 96px;
            gap: 10px;
            align-items: end;
            margin-bottom: 10px;
        }
        .deploy-repo-meta {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 10px;
        }
        .deploy-repo-action .btn {
            min-height: 38px;
        }
        .deploy-inner-layout {
            display: grid;
            grid-template-columns: 220px minmax(0, 1fr);
            gap: 20px;
            align-items: stretch;
            height: 100%;
            min-height: 0;
        }
        .deploy-inner-tabs {
            display: flex;
            flex-direction: column;
            gap: 5px;
            position: sticky;
            top: 0;
        }
        .deploy-inner-tab {
            width: 100%;
            border: none;
            background: transparent;
            color: #495057;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 500;
            text-align: left;
        }
        .deploy-inner-tab:hover {
            background: #e9ecef;
        }
        .deploy-inner-tab.active {
            background: #0d6efd;
            color: #fff;
        }
        .deploy-inner-content {
            min-width: 0;
            min-height: 0;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .deploy-workspace .editor-scroll {
            background: transparent;
        }
        .deploy-subpane {
            display: none;
        }
        .deploy-subpane.active {
            display: block;
        }
        #deploySubPaneRun.active {
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }
        #deployResultLog {
            flex: 1;
            max-height: none !important;
        }
        #connectionTestPanel {
            position: fixed;
            top: 72px;
            right: 24px;
            z-index: 1080;
            width: min(780px, calc(100vw - 32px));
            height: min(620px, calc(100vh - 96px));
            min-height: 260px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.24);
            overflow: hidden;
            resize: both;
            flex-direction: column;
        }
        .connection-test-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 12px 14px;
            border-bottom: 1px solid #dee2e6;
            background: #f8fafc;
            cursor: move;
            user-select: none;
            touch-action: none;
        }
        .connection-test-header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .connection-test-body {
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
            overflow: hidden;
            padding: 12px;
        }
        #connectionTestLog {
            flex: 1;
            background: #111827;
            color: #d1d5db !important;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.5;
            min-height: 0;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        @media (max-width: 520px) {
            #connectionTestPanel {
                top: 12px !important;
                left: 12px !important;
                right: 12px !important;
                width: auto;
                height: min(620px, calc(100vh - 24px));
                resize: none;
            }
            .connection-test-header {
                align-items: flex-start;
                gap: 10px;
            }
        }
        @media (max-width: 520px) {
            .service-component-option {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 900px) {
            .deploy-repo-list,
            .deploy-inner-layout {
                grid-template-columns: 1fr;
            }
            .deploy-inner-tabs {
                position: static;
            }
        }
        @media (max-width: 520px) {
            .deploy-repo-main,
            .deploy-repo-meta {
                grid-template-columns: 1fr;
            }
        }
        .server-row .btn-delete-row {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .server-row .btn-delete-row:hover {
            background: #c82333;
        }

        /* 导航按钮 */
        .wizard-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #dee2e6;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 700;
            margin-top: 20px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        textarea.form-control {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .new-domain-input {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }

        /* JSON 编辑器样式 */
        #jsoneditor, #previewEditor {
            height: 500px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }

        /* 服务器选项卡样式 */
        .server-tabs {
            position: sticky;
            top: 20px;
        }

        .server-tabs .nav-link {
            text-align: left;
            margin-bottom: 5px;
            border-radius: 8px;
            color: #495057;
        }

        .server-tabs .nav-link:hover {
            background-color: #e9ecef;
        }

        .server-tabs .nav-link.active {
            background-color: #0d6efd;
            color: white;
        }

        /* 验证错误样式 */
        .is-invalid {
            border-color: #dc3545 !important;
        }

        .invalid-feedback {
            display: none;
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .is-invalid ~ .invalid-feedback,
        .input-group .is-invalid ~ .invalid-feedback {
            display: block;
        }

        /* 端口放行提醒面板 */
        .port-reminder-panel {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .port-reminder-panel .panel-header {
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .port-reminder-panel .panel-header:hover {
            background: rgba(255, 193, 7, 0.1);
        }

        .port-reminder-panel h5 {
            color: #856404;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .port-reminder-panel .toggle-icon {
            color: #856404;
            font-size: 20px;
            transition: transform 0.3s;
        }

        .port-reminder-panel .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .port-reminder-panel .panel-content {
            padding: 0 20px 20px 20px;
            max-height: 500px;
            overflow-y: auto;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }

        .port-reminder-panel .panel-content.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            overflow: hidden;
        }

        .port-reminder-panel .server-port-info {
            background: white;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ffc107;
        }

        .port-reminder-panel .server-port-info:last-child {
            margin-bottom: 0;
        }

        .port-reminder-panel .server-name {
            font-weight: 600;
            color: #495057;
            margin-bottom: 5px;
        }

        .port-reminder-panel .server-ip {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .port-reminder-panel .port-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .port-reminder-panel .port-badge {
            background: #0d6efd;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        /* 域名解析提醒面板 */
        .dns-reminder-panel {
            background: #d1ecf1;
            border: 2px solid #17a2b8;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 20px;
            font-size: 15px;
            color: #0c5460;
        }

        .dns-reminder-panel .dns-domain {
            font-weight: 600;
            color: #0c5460;
        }

        .dns-reminder-panel .dns-ip {
            font-weight: 600;
            color: #17a2b8;
        }

        html, body {
            height: 100%;
        }
        body {
            background: #f4f6f8;
            padding: 0;
            overflow: hidden;
        }
        .app-shell {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #f4f6f8;
        }
        .top-tabs {
            height: 56px;
            display: flex;
            align-items: stretch;
            justify-content: center;
            background: #ffffff;
            border-bottom: 1px solid #d8dee7;
            padding: 0 18px;
            gap: 6px;
        }
        .app-tab {
            border: 0;
            background: transparent;
            padding: 0 26px;
            font-size: 16px;
            font-weight: 700;
            color: #576273;
            border-bottom: 3px solid transparent;
        }
        .app-tab.active {
            color: #0d6efd;
            border-bottom-color: #0d6efd;
        }
        .app-main {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .main-view {
            display: none;
            height: 100%;
            min-height: 0;
        }
        .main-view.active {
            display: flex;
        }
        #configView {
            flex-direction: row;
        }
        #deployView {
            flex-direction: row;
            overflow: hidden;
        }
        .domain-sidebar {
            width: 320px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d8dee7;
            background: #ffffff;
            padding: 18px;
            gap: 14px;
        }
        .sidebar-title {
            font-size: 18px;
            font-weight: 800;
            color: #243041;
        }
        .sidebar-subtitle {
            font-size: 12px;
            color: #7b8794;
            margin-top: 2px;
        }
        .domain-add-row {
            flex-shrink: 0;
        }
        .domain-sidebar .domain-list {
            flex: 1;
            max-height: none;
            min-height: 0;
            overflow-y: auto;
        }
        .config-workspace {
            flex: 1;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            padding: 18px;
        }
        .domain-editor {
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border: 1px solid #d8dee7;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }
        .editor-kicker {
            font-size: 12px;
            color: #7b8794;
        }
        .editor-domain {
            font-size: 20px;
            line-height: 1.2;
            font-weight: 800;
            color: #1f2937;
        }
        .editor-status {
            font-size: 12px;
            color: #198754;
        }
        .editor-body {
            flex: 1;
            min-height: 0;
        }
        .editor-body > [class*="col-"] {
            min-height: 0;
        }
        .editor-scroll {
            height: 100%;
            overflow-y: auto;
            padding-bottom: 20px;
        }
        .server-tabs {
            position: sticky;
            top: 0;
        }
        .deploy-panel {
            width: 100%;
            height: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 18px;
        }
        .deploy-panel > .section-title {
            flex-shrink: 0;
        }
        .deploy-panel > .server-row {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .action-bar {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 0 18px;
            background: #ffffff;
            border-top: 1px solid #d8dee7;
        }
        .action-right {
            display: flex;
            gap: 10px;
        }
        .empty-state {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #6b7280;
        }
        .empty-title {
            font-size: 22px;
            font-weight: 800;
            color: #243041;
            margin-bottom: 8px;
        }
        .empty-text {
            max-width: 520px;
        }
        .load-panel {
            width: min(1280px, 100%);
            height: 100%;
            margin: 0 auto;
            padding: 22px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .load-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            background: #ffffff;
            border: 1px solid #d8dee7;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }
        .load-title {
            font-size: 20px;
            font-weight: 800;
            color: #243041;
        }
        .load-subtitle {
            font-size: 13px;
            color: #7b8794;
            margin-top: 3px;
        }
        #jsoneditor {
            flex: 1;
            min-height: 0;
            height: auto;
            background: #ffffff;
        }
        .hidden-editor {
            position: absolute;
            left: -99999px;
            top: -99999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="top-tabs">
        <button type="button" class="app-tab active" id="loadTabBtn" onclick="showMainTab('load')">加载</button>
        <button type="button" class="app-tab" id="configTabBtn" onclick="showMainTab('config')">配置</button>
        <button type="button" class="app-tab" id="deployTabBtn" onclick="showMainTab('deploy')">部署</button>
    </div>

    <input type="file" id="configFile" accept=".json,application/json" style="display: none;" onchange="loadConfigFromFile()">
    <div id="previewEditor" class="hidden-editor"></div>

    <main class="app-main">
        <section class="main-view active" id="loadView">
            <div class="load-panel">
                <div class="load-header">
                    <div>
                        <div class="load-title">加载配置</div>
                        <div class="load-subtitle">上传或直接编辑 IAA JSON，切到配置页后会按 web 域名生成左侧列表。</div>
                    </div>
                </div>
                <div id="jsoneditor"></div>
            </div>
        </section>

        <section class="main-view" id="configView">
            <aside class="domain-sidebar">
                <div class="sidebar-header">
                    <div>
                        <div class="sidebar-title">域名列表</div>
                        <div class="sidebar-subtitle">选择、追加或删除部署节点</div>
                    </div>
                </div>

                <div class="input-group domain-add-row">
                    <input type="text" class="form-control new-domain-input" id="newDomainInput" placeholder="task.ceenads.com">
                    <button class="btn btn-primary" type="button" onclick="addNewDomain()">新增</button>
                </div>

                <div class="domain-list" id="domainList"></div>
            </aside>

            <section class="config-workspace">
                <div class="empty-state" id="noDomainState">
                    <div class="empty-title">请选择或新增一个域名</div>
                    <div class="empty-text">读取本地 JSON 后会在左侧显示已有域名，选中后可直接修改服务器、数据库、Redis 和 Nginx 配置。</div>
                </div>

                <div class="domain-editor" id="domainEditor" style="display: none;">
                    <div class="editor-header" id="currentDomainAlert">
                        <div>
                            <div class="editor-kicker">当前域名</div>
                            <div class="editor-domain" id="currentDomainName"></div>
                        </div>
                        <div class="editor-status" id="autosaveStatus">已保存到当前配置</div>
                    </div>

                    <div class="row editor-body">
                        <div class="col-md-3">
                            <div class="nav flex-column nav-pills server-tabs" id="serverTabs" role="tablist">
                                <button class="nav-link active" id="params-tab" data-bs-toggle="pill" data-bs-target="#params" type="button" role="tab">⚙️ 参数设置</button>
                                <button class="nav-link" id="busDb-tab" data-bs-toggle="pill" data-bs-target="#busDb" type="button" role="tab">🗄️ 业务数据库</button>
                                <button class="nav-link" id="riskDb-tab" data-bs-toggle="pill" data-bs-target="#riskDb" type="button" role="tab">🗄️ 风控数据库</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsoneditor@9.10.0/dist/jsoneditor.min.js"></script>
<script>
    // 全局变量
    let currentConfig = null;
    let currentStep = 1;
    let activeMainTab = 'load';
    let selectedDomain = null;
    let isNewDomain = false;
    let serviceServerCount = 0;
    let redisServerCount = 0;
    let operationMode = null; // 'new', 'edit', 'delete'
    let editor = null; // JSON 编辑器实例
    let previewEditor = null; // 预览编辑器实例

    // 切换密码显示/隐藏
    function togglePassword(button, show) {
        const input = button.previousElementSibling;
        if (show) {
            input.type = 'text';
        } else {
            input.type = 'password';
        }
    }

    function serverAuthMethod(server = {}) {
        return server.private_key ? 'key' : 'password';
    }

    function serverAuthMethodHtml(prefix, server = {}) {
        const method = serverAuthMethod(server);
        return `
            <div class="col-md-4">
                <label class="form-label">SSH认证</label>
                <select class="form-select" id="${prefix}_authMethod" onchange="updateServerAuthFields('${prefix}')">
                    <option value="password"${method === 'password' ? ' selected' : ''}>密码</option>
                    <option value="key"${method === 'key' ? ' selected' : ''}>私钥</option>
                </select>
            </div>
        `;
    }

    function serverAuthCredentialHtml(prefix, server = {}) {
        return `
            <div class="col-12" id="${prefix}_passwordGroup">
                <label class="form-label">SSH密码</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="${prefix}_pass" value="${escapeHtml(server.pass || '')}">
                    <button class="btn btn-outline-secondary" type="button" onmousedown="togglePassword(this, true)" onmouseup="togglePassword(this, false)" onmouseleave="togglePassword(this, false)">👁️</button>
                </div>
            </div>
            <div class="col-12" id="${prefix}_privateKeyGroup" style="display: none;">
                <label class="form-label">SSH私钥</label>
                <input type="file" class="form-control mb-2" accept=".pem,.key,.txt,.pub" onchange="readPrivateKeyFile('${prefix}', this)">
                <textarea class="form-control" id="${prefix}_privateKey" rows="4" spellcheck="false">${escapeHtml(server.private_key || '')}</textarea>
            </div>
        `;
    }

    function readPrivateKeyFile(prefix, input) {
        const file = input.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = event => {
            const keyInput = document.getElementById(`${prefix}_privateKey`);
            if (keyInput) {
                keyInput.value = event.target?.result || '';
                keyInput.classList.remove('is-invalid');
                saveCurrentDomainDraft(false);
            }
            input.value = '';
        };
        reader.onerror = () => {
            alert('❌ 读取私钥文件失败。');
            input.value = '';
        };
        reader.readAsText(file);
    }

    function updateServerAuthFields(prefix) {
        const method = document.getElementById(`${prefix}_authMethod`)?.value || 'password';
        const passwordGroup = document.getElementById(`${prefix}_passwordGroup`);
        const privateKeyGroup = document.getElementById(`${prefix}_privateKeyGroup`);
        if (passwordGroup) {
            passwordGroup.style.display = method === 'password' ? '' : 'none';
        }
        if (privateKeyGroup) {
            privateKeyGroup.style.display = method === 'key' ? '' : 'none';
        }
    }

    function collectServerAuth(prefix) {
        const method = document.getElementById(`${prefix}_authMethod`)?.value || 'password';
        const pass = document.getElementById(`${prefix}_pass`)?.value.trim() || '';
        const privateKey = document.getElementById(`${prefix}_privateKey`)?.value.trim() || '';
        return method === 'key'
            ? { private_key: privateKey }
            : { pass };
    }

    function fillServerAuth(prefix, server = {}) {
        const methodEl = document.getElementById(`${prefix}_authMethod`);
        if (methodEl) {
            methodEl.value = serverAuthMethod(server);
        }
        const passEl = document.getElementById(`${prefix}_pass`);
        if (passEl) {
            passEl.value = server.pass || '';
        }
        const keyEl = document.getElementById(`${prefix}_privateKey`);
        if (keyEl) {
            keyEl.value = server.private_key || '';
        }
        updateServerAuthFields(prefix);
    }

    function validateServerAuth(prefix, invalidFields = []) {
        const method = document.getElementById(`${prefix}_authMethod`)?.value || 'password';
        const fieldId = method === 'key' ? `${prefix}_privateKey` : `${prefix}_pass`;
        const input = document.getElementById(fieldId);
        if (input && !input.value.trim()) {
            input.classList.add('is-invalid');
            invalidFields.push(fieldId);
            return false;
        }
        input?.classList.remove('is-invalid');
        return true;
    }

    function showMainTab(tab) {
        if (activeMainTab === 'config' && tab !== 'config' && !saveCurrentDomainDraft(false)) {
            return;
        }
        if ((tab === 'config' || tab === 'deploy') && !syncEditorConfig()) {
            return;
        }
        if (tab === 'deploy') {
            generatePreview();
        }

        ['load', 'config', 'deploy'].forEach(name => {
            document.getElementById(name + 'View').classList.toggle('active', name === tab);
            document.getElementById(name + 'TabBtn').classList.toggle('active', name === tab);
        });
        activeMainTab = tab;

        if (tab === 'load' && editor?.refresh) {
            setTimeout(() => editor.refresh(), 0);
        }
        if (tab === 'config') {
            populateDomainList();
        }
    }

    function showDeploySubTab(tab) {
        const tabs = {
            params: ['deploySubTabParams', 'deploySubPaneParams'],
            run: ['deploySubTabRun', 'deploySubPaneRun']
        };
        Object.entries(tabs).forEach(([name, ids]) => {
            const active = name === tab;
            document.getElementById(ids[0])?.classList.toggle('active', active);
            document.getElementById(ids[1])?.classList.toggle('active', active);
        });
    }

    function refreshInfoPanel() {
        saveCurrentDomainDraft(false);
        generatePreview();
    }

    function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"]/g, char => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        }[char]));
    }

    function syncEditorConfig() {
        try {
            const config = editor.get();
            currentConfig = config || { web: [] };
            if (!Array.isArray(currentConfig.web)) {
                currentConfig.web = [];
            }
            return true;
        } catch (err) {
            alert('❌ 配置格式错误：' + err.message);
            ['load', 'config', 'deploy'].forEach(name => {
                document.getElementById(name + 'View').classList.toggle('active', name === 'load');
                document.getElementById(name + 'TabBtn').classList.toggle('active', name === 'load');
            });
            if (editor?.refresh) {
                setTimeout(() => editor.refresh(), 0);
            }
            return false;
        }
    }

    function updateEditorConfig() {
        if (editor && currentConfig) {
            editor.set(currentConfig);
        }
        if (previewEditor && currentConfig) {
            previewEditor.set(currentConfig);
        }
    }

    function showDomainEditor() {
        document.getElementById('noDomainState').style.display = 'none';
        document.getElementById('domainEditor').style.display = 'flex';
    }

    function hideDomainEditor() {
        document.getElementById('noDomainState').style.display = 'flex';
        document.getElementById('domainEditor').style.display = 'none';
    }

    function saveCurrentDomainDraft(strict = false) {
        if (!selectedDomain || !document.getElementById('paramsContent')?.children.length) {
            return true;
        }
        if (strict && !validateAllFields()) {
            return false;
        }
        const ok = generateConfigFromForm({ strict });
        if (ok) {
            updateEditorConfig();
            const status = document.getElementById('autosaveStatus');
            if (status) {
                status.textContent = '已保存到当前配置 ' + new Date().toLocaleTimeString();
            }
        }
        return ok;
    }

    function bindAutosaveHandlers() {
        const editorEl = document.getElementById('domainEditor');
        if (!editorEl || editorEl.dataset.autosaveBound === 'true') {
            return;
        }
        let timer = null;
        const queueSave = () => {
            clearTimeout(timer);
            timer = setTimeout(() => saveCurrentDomainDraft(false), 350);
        };
        editorEl.addEventListener('input', queueSave);
        editorEl.addEventListener('change', queueSave);
        editorEl.dataset.autosaveBound = 'true';
    }

    // 从文件加载配置
    function loadConfigFromFile() {
        const fileInput = document.getElementById('configFile');
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                editor.set(json);
                if (syncEditorConfig()) {
                    selectedDomain = null;
                    hideDomainEditor();
                    populateDomainList();
                    applyDeploySetup();
                    showMainTab('config');
                }
            } catch (err) {
                alert('❌ 读取文件失败：' + err.message);
            } finally {
                fileInput.value = '';
            }
        };
        reader.onerror = function() {
            alert('❌ 读取文件失败！');
        };
        reader.readAsText(file);
    }

    // 加载配置（内部函数）
    function loadConfig() {
        return syncEditorConfig();
    }

    // 填充域名列表
    function populateDomainList() {
        if (!currentConfig && !syncEditorConfig()) {
            return;
        }

        const domainList = document.getElementById('domainList');
        domainList.innerHTML = '';

        const domains = (currentConfig.web || []).map(item => item.domain).filter(Boolean);
        if (selectedDomain && !domains.includes(selectedDomain)) {
            domains.push(selectedDomain);
        }

        if (domains.length === 0) {
            domainList.innerHTML = '<div class="alert alert-warning">暂无域名配置</div>';
            return;
        }

        domains.forEach(domain => {
            const item = document.createElement('div');
            item.className = 'domain-item' + (domain === selectedDomain ? ' selected' : '');
            item.innerHTML = `
                    <span class="domain-name">${escapeHtml(domain)}</span>
                    <button class="btn-delete-domain" type="button" title="删除此域名">✕</button>
                `;
            item.addEventListener('click', () => selectDomainItem(domain, item));
            item.querySelector('.btn-delete-domain').addEventListener('click', event => deleteDomainItem(domain, event));
            domainList.appendChild(item);
        });
    }

    // 新增域名
    function addNewDomain() {
        if (!saveCurrentDomainDraft(false)) {
            return;
        }
        if (!syncEditorConfig()) {
            return;
        }

        const newDomain = document.getElementById('newDomainInput').value.trim();
        if (!newDomain) {
            alert('❌ 请输入域名！');
            return;
        }
        if (!validateDomain(newDomain)) {
            alert('❌ 请输入有效的域名格式！');
            return;
        }
        if (currentConfig.web.find(w => w.domain === newDomain)) {
            alert('❌ 该域名已存在，请直接从列表中选择！');
            return;
        }

        selectedDomain = newDomain;
        operationMode = 'new';
        isNewDomain = true;
        document.getElementById('newDomainInput').value = '';
        showDomainEditor();
        loadServerConfigForm();
        populateDomainList();
    }

    // 选择域名项
    function selectDomainItem(domain) {
        if (domain === selectedDomain) {
            populateDomainList();
            return;
        }
        if (!saveCurrentDomainDraft(false)) {
            return;
        }
        if (!syncEditorConfig()) {
            return;
        }

        selectedDomain = domain;
        operationMode = 'edit';
        isNewDomain = false;
        document.getElementById('newDomainInput').value = '';
        showDomainEditor();
        loadServerConfigForm();
        populateDomainList();
    }

    // 删除域名项
    function deleteDomainItem(domain, event) {
        event.stopPropagation();
        if (!confirm(`⚠️ 确定要删除域名 "${domain}" 吗？`)) {
            return;
        }
        if (!syncEditorConfig()) {
            return;
        }

        currentConfig.web = currentConfig.web.filter(w => w.domain !== domain);
        if (selectedDomain === domain) {
            selectedDomain = null;
            operationMode = null;
            isNewDomain = false;
            hideDomainEditor();
        }
        updateEditorConfig();
        populateDomainList();
        generatePreview();
    }

    // ========== 验证函数 ==========

    // 验证IP地址格式
    function validateIP(ip) {
        const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
        if (!ipPattern.test(ip)) return false;
        const parts = ip.split('.');
        return parts.every(part => parseInt(part) >= 0 && parseInt(part) <= 255);
    }

    // 验证端口号格式
    function validatePort(port) {
        const text = String(port ?? '').trim();
        if (!/^\d+$/.test(text)) return false;
        const portNum = Number(text);
        return !isNaN(portNum) && portNum >= 1 && portNum <= 65535;
    }

    // 验证 Redis 库序
    function validateRedisRank(rank) {
        const text = String(rank ?? '').trim();
        if (!/^\d+$/.test(text)) return false;
        const rankNum = Number(text);
        return !isNaN(rankNum) && rankNum >= 0 && rankNum <= 15;
    }

    // 验证域名格式
    function validateDomain(domain) {
        const domainPattern = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;
        return domainPattern.test(domain);
    }

    // 为输入框添加验证
    function addValidation(inputId, validationType, errorMessage) {
        const input = document.getElementById(inputId);
        if (!input) return;

        // 移除已存在的错误提示
        const existingFeedback = input.parentElement.querySelector('.invalid-feedback');
        if (existingFeedback) {
            existingFeedback.remove();
        }

        // 添加错误提示元素
        const feedback = document.createElement('div');
        feedback.className = 'invalid-feedback';
        feedback.textContent = errorMessage;

        if (input.parentElement.classList.contains('input-group')) {
            input.parentElement.parentElement.appendChild(feedback);
        } else {
            input.parentElement.appendChild(feedback);
        }

        // 失去焦点时验证
        input.addEventListener('blur', function() {
            validateField(inputId, validationType, errorMessage);
        });

        // 输入时清除错误状态
        input.addEventListener('input', function() {
            input.classList.remove('is-invalid');
        });
    }

    // 验证单个字段
    function validateField(inputId, validationType, errorMessage) {
        const input = document.getElementById(inputId);
        if (!input) return true;

        const value = input.value.trim();
        let isValid = true;

        if (validationType === 'required') {
            isValid = value !== '';
        } else if (validationType === 'ip') {
            isValid = value === '' || validateIP(value);
        } else if (validationType === 'port') {
            isValid = value === '' || validatePort(value);
        } else if (validationType === 'redisRank') {
            isValid = value === '' || validateRedisRank(value);
        } else if (validationType === 'domain') {
            isValid = value === '' || validateDomain(value);
        }

        if (!isValid) {
            input.classList.add('is-invalid');
        } else {
            input.classList.remove('is-invalid');
        }

        return isValid;
    }

    // 检查同类型服务器是否重复
    function checkDuplicateServer(serverType, currentId, host, comm) {
        const container = serverType === 'service' ?
            document.getElementById('serviceServers') :
            document.getElementById('redisServers');

        if (!container) return false;

        const servers = container.querySelectorAll('.server-row');
        for (let server of servers) {
            if (server.id === currentId) continue; // 跳过当前服务器

            // 从 serviceServer_0 或 redisServer_0 中提取 service_0 或 redis_0
            const serverId = server.id.replace('serviceServer_', 'service_').replace('redisServer_', 'redis_');
            const existingHost = document.getElementById(`${serverId}_host`)?.value.trim();
            const existingComm = document.getElementById(`${serverId}_comm`)?.value.trim();

            // 如果公网地址或内网地址有任一相同，则认为重复
            if ((host && host === existingHost) || (comm && comm === existingComm)) {
                return true;
            }
        }
        return false;
    }

    // 验证所有必填字段
    function validateAllFields() {
        let isValid = true;
        const invalidFields = [];

        // 验证参数设置
        const paramsFields = [
            'share_username', 'share_password',
            'bus_admin_user', 'bus_admin_pass',
            'risk_admin_user', 'risk_admin_pass',
            'bus_web_path', 'bus_web_port',
            'risk_web_path', 'risk_web_port'
        ];

        paramsFields.forEach(fieldId => {
            const input = document.getElementById(fieldId);
            if (input && !input.value.trim()) {
                input.classList.add('is-invalid');
                isValid = false;
                invalidFields.push(fieldId);
            }
        });

        // 验证数据库服务器
        ['busDb', 'riskDb'].forEach(prefix => {
            ['host', 'comm', 'port', 'user', 'dbPort', 'dbUser', 'dbPass'].forEach(field => {
                const input = document.getElementById(`${prefix}_${field}`);
                if (input && !input.value.trim()) {
                    input.classList.add('is-invalid');
                    isValid = false;
                    invalidFields.push(`${prefix}_${field}`);
                }
            });
            if (!validateServerAuth(prefix, invalidFields)) {
                isValid = false;
            }
        });

        // 验证网关服务器
        ['host', 'comm', 'port', 'user'].forEach(field => {
            const input = document.getElementById(`gateway_${field}`);
            if (input && !input.value.trim()) {
                input.classList.add('is-invalid');
                isValid = false;
                invalidFields.push(`gateway_${field}`);
            }
        });
        if (!validateServerAuth('gateway', invalidFields)) {
            isValid = false;
        }

        // 验证负载服务器
        const serviceServers = document.getElementById('serviceServers')?.querySelectorAll('.server-row');
        if (serviceServers) {
            serviceServers.forEach(server => {
                const id = server.id.replace('serviceServer_', '');
                ['host', 'comm', 'port', 'user'].forEach(field => {
                    const input = document.getElementById(`service_${id}_${field}`);
                    if (input && !input.value.trim()) {
                        input.classList.add('is-invalid');
                        isValid = false;
                        invalidFields.push(`service_${id}_${field}`);
                    }
                });
                if (!validateServerAuth(`service_${id}`, invalidFields)) {
                    isValid = false;
                }
            });
        }

        // 验证缓存配置。Redis 密码允许为空，deploy 脚本会按无密码模式启动。
        ['redisPort', 'redisRank'].forEach(fieldId => {
            const input = document.getElementById(fieldId);
            if (input && !input.value.trim()) {
                input.classList.add('is-invalid');
                isValid = false;
                invalidFields.push(fieldId);
            }
        });

        const redisServers = document.getElementById('redisServers')?.querySelectorAll('.server-row');
        if (redisServers) {
            redisServers.forEach(server => {
                const id = server.id.replace('redisServer_', '');
                ['host', 'comm', 'port', 'user'].forEach(field => {
                    const input = document.getElementById(`redis_${id}_${field}`);
                    if (input && !input.value.trim()) {
                        input.classList.add('is-invalid');
                        isValid = false;
                        invalidFields.push(`redis_${id}_${field}`);
                    }
                });
                if (!validateServerAuth(`redis_${id}`, invalidFields)) {
                    isValid = false;
                }
            });
        }

        if (!isValid) {
            alert('❌ 请填写所有必填字段！');
        }

        return isValid;
    }

    async function testServerConnection(prefix, hasDatabase) {
        // 收集服务器信息
        const host = document.getElementById(`${prefix}_host`)?.value.trim();
        const comm = document.getElementById(`${prefix}_comm`)?.value.trim();
        const port = document.getElementById(`${prefix}_port`)?.value.trim() || '22';
        const user = document.getElementById(`${prefix}_user`)?.value.trim() || 'root';
        const auth = collectServerAuth(prefix);

        // 验证必填项
        if (!host) {
            alert('❌ 请先填写公网地址！');
            return;
        }
        if (!auth.pass && !auth.private_key) {
            alert('❌ 请先填写 SSH 密码或 SSH 私钥！');
            return;
        }

        // 验证IP格式或域名格式
        const ipPattern = /^(\d{1,3}\.){3}\d{1,3}$/;
        const domainPattern = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*$/;

        if (!ipPattern.test(host) && !domainPattern.test(host)) {
            alert('❌ 公网地址格式不正确！\n请输入有效的IP地址或域名。');
            return;
        }

        // 如果是IP，验证每个段是否在0-255范围内
        if (ipPattern.test(host)) {
            const segments = host.split('.');
            for (let segment of segments) {
                const num = parseInt(segment);
                if (num < 0 || num > 255) {
                    alert('❌ IP地址格式不正确！\n每个段的值应在 0-255 之间。');
                    return;
                }
            }
        }

        // 验证端口号
        const portNum = parseInt(port);
        if (isNaN(portNum) || portNum < 1 || portNum > 65535) {
            alert('❌ SSH端口号不正确！\n端口号应在 1-65535 之间。');
            return;
        }

        // 验证内网地址（如果填写了）
        if (comm) {
            if (!ipPattern.test(comm) && !domainPattern.test(comm)) {
                alert('❌ 内网地址格式不正确！');
                return;
            }
        }

        // 数据库配置验证
        let dbInfo = '';
        if (hasDatabase) {
            const dbPort = document.getElementById(`${prefix}_dbPort`)?.value.trim();
            const dbUser = document.getElementById(`${prefix}_dbUser`)?.value.trim();
            const dbPass = document.getElementById(`${prefix}_dbPass`)?.value.trim();

            if (dbPort) {
                const dbPortNum = parseInt(dbPort);
                if (isNaN(dbPortNum) || dbPortNum < 1 || dbPortNum > 65535) {
                    alert('❌ 数据库端口号不正确！\n端口号应在 1-65535 之间。');
                    return;
                }
                dbInfo = '\n\n📊 数据库配置：\n  端口: ' + dbPort + '\n  用户: ' + (dbUser || '未填写') + '\n  密码: ' + (dbPass ? '已填写' : '未填写');
            }
        }

        const testConfig = {
            kind: hasDatabase ? 'database' : 'server',
            label: connectionTestLabel(prefix, hasDatabase),
            server: {
                host,
                comm,
                port,
                user,
                ...(auth.private_key ? { private_key: auth.private_key } : { pass: auth.pass })
            }
        };

        if (hasDatabase) {
            testConfig.database = {
                host: comm || '127.0.0.1',
                port: document.getElementById(`${prefix}_dbPort`)?.value.trim(),
                user: document.getElementById(`${prefix}_dbUser`)?.value.trim() || 'root',
                pass: document.getElementById(`${prefix}_dbPass`)?.value.trim() || ''
            };
        }

        try {
            await triggerConnectionTest(testConfig);
        } catch (error) {
            setConnectionTestStatus('失败', 'danger');
            connectionTestLog('失败：' + error.message);
        }
    }

    function connectionTestLabel(prefix, hasDatabase) {
        const labels = {
            busDb: '业务数据库',
            riskDb: '风控数据库',
            gateway: '网关服务器'
        };
        if (labels[prefix]) return labels[prefix];
        if (prefix.startsWith('service_')) return '业务服务器';
        if (prefix.startsWith('redis_')) return 'Redis 服务器';
        return hasDatabase ? '数据库服务器' : '服务器';
    }

    function normalizeRepositoryValue(value, fallback) {
        const text = String(value || '').trim();
        return text && text !== '__REPOSITORY__' ? text : fallback;

    function normalizeReleaseTagValue(value, fallback = 'latest') {
        const text = String(value || '').trim();
        return text && text !== '__RELEASE_TAG__' ? text : fallback;

    function githubTokenValue() {
        return document.getElementById('deployGithubToken')?.value.trim() || currentConfig?.setup?.deploy?.token || '';
    }

    async function triggerConnectionTest(testConfig) {
        const token = githubTokenValue();
        if (!token) {
            alert('❌ 请先在部署页填写 GitHub Token，连接测试需要用它触发 platform 仓库的测试 workflow。');
            showMainTab('deploy');
            return;
        }

        const platform = parseRepo(deployPlatformRepositoryValue(), 'Platform');
        const ref = document.getElementById('deployPlatformWorkflowRef')?.value.trim() || 'master';

        showConnectionTestPanel(testConfig.label);
        connectionTestLog(`触发连接测试：${platform.repo} / ${testConfig.label}`);

        const startedAt = new Date();
        const response = await fetch(`https://api.github.com/repos/${platform.owner}/${platform.name}/actions/workflows/connection-test.yml/dispatches`, {
            method: 'POST',
            headers: {
                'Accept': 'application/vnd.github+json',
                'Authorization': 'Bearer ' + token,
                'X-GitHub-Api-Version': '2022-11-28',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ref,
                inputs: {
                    test_config: JSON.stringify(testConfig)
                }
            })
        });

        if (response.status !== 204) {
            const text = await response.text();
            throw new Error(`连接测试 workflow 触发失败，GitHub API 返回 ${response.status}: ${text}`);
        }

        connectionTestLog('连接测试 workflow 已触发，等待 GitHub 创建 run...');
        const run = await findWorkflowRun(
            platform,
            CONNECTION_TEST_WORKFLOW_FILE,
            ref,
            token,
            startedAt,
            connectionTestLog,
            'connection-test workflow run'
        );
        setConnectionTestRunLink(run.html_url);
        await monitorWorkflowRun(platform, run, token, {
            log: connectionTestLog,
            completeLabel: '连接测试结束',
            failureMessage: '连接测试未成功',
            logTailLines: 80,
            pollIntervalMs: 5000
        });
        setConnectionTestStatus('成功', 'success');
        connectionTestLog('连接测试通过。');
    }

    // 生成端口放行提醒
    function generatePortReminder() {
        const content = document.getElementById('portReminderContent');
        content.innerHTML = '';

        if (!currentConfig || !currentConfig.web) return;

        const domainConfig = currentConfig.web.find(w => w.domain === selectedDomain);
        if (!domainConfig) return;

        // 使用 Map 来合并同一服务器的端口和角色
        const serverMap = new Map();

        // 辅助函数：添加服务器信息
        function addServerInfo(host, sshPort, role, ports) {
            if (!serverMap.has(host)) {
                serverMap.set(host, {
                    host: host,
                    sshPort: sshPort || 22,
                    roles: [],
                    ports: new Map() // 使用 Map 避免端口重复
                });
            }

            const serverInfo = serverMap.get(host);
            serverInfo.roles.push(role);

            // 添加 SSH 端口（如果端口已存在，合并描述）
            const sshPortNum = sshPort || 22;
            if (serverInfo.ports.has(sshPortNum)) {
                const existingDesc = serverInfo.ports.get(sshPortNum);
                if (!existingDesc.includes('SSH')) {
                    serverInfo.ports.set(sshPortNum, existingDesc + ' + SSH');
                }
            } else {
                serverInfo.ports.set(sshPortNum, 'SSH');
            }

            // 添加其他端口（如果端口已存在，合并描述）
            if (ports) {
                ports.forEach(p => {
                    if (serverInfo.ports.has(p.port)) {
                        const existingDesc = serverInfo.ports.get(p.port);
                        if (!existingDesc.includes(p.desc)) {
                            serverInfo.ports.set(p.port, existingDesc + ' + ' + p.desc);
                        }
                    } else {
                        serverInfo.ports.set(p.port, p.desc);
                    }
                });
            }
        }

        // 业务数据库服务器
        const busDbServer = domainConfig.system?.bus?.mysql?.servers?.[0];
        if (busDbServer) {
            addServerInfo(
                busDbServer.host,
                busDbServer.port,
                '业务数据库',
                [{ port: domainConfig.system.bus.mysql.config?.port || 13367, desc: 'MySQL(业务)' }]
            );
        }

        // 风控数据库服务器
        const riskDbServer = domainConfig.system?.risk?.mysql?.servers?.[0];
        if (riskDbServer) {
            addServerInfo(
                riskDbServer.host,
                riskDbServer.port,
                '风控数据库',
                [{ port: domainConfig.system.risk.mysql.config?.port || 13368, desc: 'MySQL(风控)' }]
            );
        }

        // 网关服务器
        const gatewayServers = domainConfig.system?.service?.nginx?.servers || [];
        const busWebPort = domainConfig.system?.bus?.web?.nginx?.listen_port || 8010;
        const riskWebPort = domainConfig.system?.risk?.web?.nginx?.listen_port || 8020;

        gatewayServers.forEach((server) => {
            addServerInfo(
                server.host,
                server.port,
                '网关',
                [
                    { port: 80, desc: 'HTTP' },
                    { port: 443, desc: 'HTTPS' },
                    { port: busWebPort, desc: 'Web(业务)' },
                    { port: riskWebPort, desc: 'Web(风控)' },
                    { port: 8081, desc: 'Java(业务)' },
                    { port: 8082, desc: 'Java(风控)' }
                ]
            );
        });

        // 负载服务器
        const producerServers = domainConfig.system?.service?.producer?.servers || [];
        producerServers.forEach((server) => {
            addServerInfo(
                server.host,
                server.port,
                '负载',
                [
                    { port: 8000, desc: 'Producer' },
                    { port: 8001, desc: 'Producer' },
                    { port: 8002, desc: 'Producer' },
                    { port: 8003, desc: 'Producer' }
                ]
            );
        });

        // 缓存服务器
        const redisServers = domainConfig.system?.service?.redis?.servers || [];
        const redisPort = domainConfig.system?.service?.redis?.environment?.PORT || 16379;
        redisServers.forEach((server) => {
            addServerInfo(
                server.host,
                server.port,
                '缓存',
                [{ port: redisPort, desc: 'Redis' }]
            );

        // 生成HTML
        serverMap.forEach((serverInfo, host) => {
            const div = document.createElement('div');

            // 角色列表

                return `<span class="port-badge">${port} (${desc})</span>`;

            div.innerHTML = `

                    <div class="server-ip">📍 ${host}</div>
