<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store">
  <title>iOS Coruna Research Preflight</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: Canvas;
      color: CanvasText;
    }
    main {
      width: min(720px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
      border-radius: 8px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }
    p {
      margin: 10px 0;
    }
    code {
      padding: 2px 5px;
      border-radius: 4px;
      background: color-mix(in srgb, CanvasText 10%, transparent);
    }
  </style>
</head>
<body>
  <main>
    <h1>iOS Coruna Research Preflight</h1>
    <p>This Pages artifact is a non-executable research placeholder for <code>ios/coruna</code>.</p>
    <p>The public deployment intentionally does not include <code>group.html</code>, Stage modules, or payload files.</p>
    <p>Run dry-run checks from a controlled local checkout with <code>group.html?dryRun=1</code>.</p>
  </main>
</body>
</html>
