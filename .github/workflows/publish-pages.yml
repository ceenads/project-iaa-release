name: Publish Pages

on:
  push:
    branches:
      - master
    paths:
      - 'setup/index.html'
      - '.github/workflows/publish-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          worktree="$(mktemp -d)"
          git fetch origin gh-pages
          git worktree add "$worktree" origin/gh-pages

          mkdir -p "$worktree/setup"
          cp setup/index.html "$worktree/setup/index.html"
          touch "$worktree/.nojekyll"

          cd "$worktree"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch project-iaa-platform web
          git add .nojekyll setup/index.html
          git commit -m "Publish setup page" || exit 0
          git push origin HEAD:gh-pages
